<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're on the list — SubZero</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0D1B2A;
    color: #F0EEE9;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .icon { font-size: 56px; margin-bottom: 24px; }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    letter-spacing: -1.5px;
    margin-bottom: 16px;
  }
  h1 span { color: #00E5A0; }
  p {
    font-size: 17px;
    color: #8A9BB0;
    max-width: 420px;
    line-height: 1.6;
    margin-bottom: 36px;
  }
  a {
    color: #00E5A0;
    font-weight: 500;
    font-size: 15px;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="icon">🎉</div>
  <h1>You're on the <span>list.</span></h1>
  <p>We'll email you the moment SubZero launches. In the meantime, tell a friend who's probably paying for things they forgot about.</p>
